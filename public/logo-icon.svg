<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Navy rounded square background -->
  <rect width="100" height="100" rx="22" fill="#13294B"/>

  <!-- ── BIRD (centered at x=50) ── -->
  <ellipse cx="47" cy="38" rx="15" ry="10" fill="white"/>
  <circle cx="60" cy="27" r="10" fill="white"/>
  <polygon points="33,40 17,33 16,49" fill="white"/>
  <polygon points="25,41 17,33 16,49 24,48" fill="#4B9CD3"/>
  <polygon points="68,26 77,28 68,30" fill="#4B9CD3"/>
  <circle cx="63" cy="25" r="2" fill="#13294B"/>
  <line x1="45" y1="47" x2="47" y2="52" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="53" y1="47" x2="53" y2="52" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── BIRDHOUSE (centered at x=50) ── -->
  <!-- Peaked roof — peak at x=50, base symmetric x=19 to x=81 -->
  <polygon points="19,66 81,66 50,52" fill="white"/>
  <!-- House body — x=26 to x=74, center=50 -->
  <rect x="26" y="65" width="48" height="30" rx="3" fill="white"/>
  <!-- Entry hole -->
  <circle cx="50" cy="80" r="7" fill="#13294B"/>
  <!-- Perch peg -->
  <rect x="47" y="87" width="6" height="3.5" rx="1.75" fill="#4B9CD3"/>
  <!-- Base platform — x=22 to x=78, center=50 -->
  <rect x="22" y="94" width="56" height="4" rx="2" fill="white"/>
</svg>
