<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Navy rounded square background -->
  <rect width="100" height="100" rx="22" fill="#13294B"/>

  <!-- Bird body -->
  <ellipse cx="44" cy="54" rx="17" ry="12" fill="white"/>

  <!-- Bird head (overlaps body to merge) -->
  <circle cx="59" cy="42" r="12" fill="white"/>

  <!-- Tail – white base -->
  <polygon points="30,56 13,47 12,66" fill="white"/>
  <!-- Tail tip accent in UNC blue -->
  <polygon points="22,57 13,47 12,66 21,65" fill="#4B9CD3"/>

  <!-- Beak – UNC blue right-pointing triangle -->
  <polygon points="69,41 80,43 69,45" fill="#4B9CD3"/>

  <!-- Eye -->
  <circle cx="62" cy="40" r="2.5" fill="#13294B"/>

  <!-- Perch bar -->
  <rect x="14" y="68" width="72" height="5" rx="2.5" fill="white"/>

  <!-- Legs -->
  <line x1="44" y1="65" x2="40" y2="68" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="65" x2="48" y2="68" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
