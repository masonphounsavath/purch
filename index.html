<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purch · Chapel Hill Subleases</title>
    <meta name="description" content="The sublease marketplace built exclusively for UNC students. Browse verified listings, message renters directly, and move in faster." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Prevent flash of wrong color mode -->
    <script>
      (function() {
        var m = localStorage.getItem('purch-mode');
        if (m === 'dark') document.documentElement.setAttribute('data-mode', 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
